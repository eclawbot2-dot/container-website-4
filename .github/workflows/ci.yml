name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      # Post-build audit of out/: link policy (no unverified external links),
      # sitemap↔pages sync, asset existence, branded 404. scripts/check-site.mjs.
      - run: npm run check
